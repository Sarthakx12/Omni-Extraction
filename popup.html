<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OmniExtract</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    
    <header class="app-header">
      <div class="logo-container">
        <div class="logo-icon"></div>
        <h1>OmniExtract</h1>
      </div>
      <p class="subtitle">Extract text and images instantly</p>
    </header>
    
    <!-- MODE TOGGLE UI -->
    <div class="panel" id="actionPanel">
      <h3 class="panel-title">Extraction Mode</h3>
      <div class="button-group">
          <button id="extractBtn" class="btn btn-primary">
            <span class="btn-text" id="extractBtnText">Extract Full Page</span>
            <div id="loaderFull" class="spinner hidden"></div>
          </button>
          
          <button id="selectContentBtn" class="btn btn-secondary">
            <span class="btn-text" id="selectBtnText">Select Area</span>
          </button>
      </div>
    </div>
    
    <!-- SELECTION ACTIVE STATE -->
    <div class="panel hidden pulse-glow" id="selectionActivePanel">
      <div class="state-indicator">
        <div class="recording-dot"></div>
        <span class="state-text">Selection Mode Active</span>
      </div>
      <p class="state-desc">The popup has closed. Click and drag on the webpage to select elements, then return here.</p>
      <button id="cancelSelectionBtn" class="btn btn-secondary w-full">Cancel Selection</button>
    </div>
    
    <!-- RESULTS UI -->
    <div class="panel hidden fade-in" id="results">
      <div class="results-header">
        <h3 id="resultsHeader">Results</h3>
        <button id="resetViewBtn" class="btn-icon" title="Clear & Restart">↺</button>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-label">Images</span>
          <span class="stat-value" id="imageCount">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Text Characters</span>
          <span class="stat-value" id="textCount">0</span>
        </div>
      </div>
      
      <!-- Animated Tabs -->
      <div class="tabs-container">
        <div class="tabs">
          <button class="tab-btn active" data-target="text-content">Text</button>
          <button class="tab-btn" data-target="img-content">Images</button>
          <button class="tab-btn ai-tab-btn" data-target="ai-content">AI Actions ✧</button>
          <div class="tab-indicator" id="tabIndicator"></div>
        </div>
      </div>

      <!-- TEXT TAB -->
      <div class="tab-content active" id="text-content">
        <textarea id="extractedText" readonly spellcheck="false" placeholder="No text found in selection."></textarea>
        <div class="action-row mt-3">
          <button id="copyTextBtn" class="btn btn-secondary flex-1">Copy Text</button>
          <button id="exportTextBtn" class="btn btn-secondary flex-1">Export .txt</button>
          <button id="exportPdfBtn" class="btn btn-secondary flex-1">Export PDF</button>
        </div>
      </div>
      
      <!-- IMAGES TAB -->
      <div class="tab-content" id="img-content">
        <div id="extractedImages" class="image-list"></div>
        <div class="action-row mt-3">
          <button id="downloadImagesBtn" class="btn btn-primary w-full">Download All (ZIP)</button>
        </div>
      </div>
      
      <!-- AI SMART MODE TAB -->
      <div class="tab-content" id="ai-content">
        <div class="ai-grid" id="aiButtonsGrid">
          <button class="btn btn-secondary ai-btn" data-action="summarize">Summarize</button>
          <button class="btn btn-secondary ai-btn" data-action="key_points">Key Points</button>
          <button class="btn btn-secondary ai-btn" data-action="blog">Convert to Blog</button>
          <button class="btn btn-secondary ai-btn" data-action="linkedin">LinkedIn Post</button>
          <button class="btn btn-secondary ai-btn ai-btn-wide" data-action="tweet">Tweet Thread</button>
        </div>
        <div class="ai-output-container mt-3">
          <textarea id="aiOutputText" readonly spellcheck="false" placeholder="Select an AI mode above to transform your text..."></textarea>
          <div id="aiLoader" class="spinner-overlay hidden">
             <div class="spinner"></div>
          </div>
        </div>
        <div class="action-row mt-3">
          <button id="copyAiTextBtn" class="btn btn-secondary flex-1" disabled>Copy Result</button>
          <button id="exportAiTextBtn" class="btn btn-secondary flex-1" disabled>Export .txt</button>
        </div>
      </div>
      
    </div>
  </div>

  <div id="toast" class="toast hidden">Action completed</div>

  <script src="html2pdf.bundle.min.js"></script>
  <script src="ai.js"></script>
  <script src="jszip.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
