<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>OmniExtract</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>OmniExtract</h2>
    </div>
    
    <!-- MODE TOGGLE UI -->
    <div class="action-panel" id="actionPanel">
      <div class="mode-desc">Choose an extraction mode:</div>
      <div class="mode-buttons">
          <button id="extractBtn" class="btn-primary">
            <span id="extractBtnText">Extract Full Page</span>
            <div id="loaderFull" class="spinner hidden"></div>
          </button>
          
          <button id="selectContentBtn" class="btn-primary-alt">
            <span id="selectBtnText">Select Content</span>
          </button>
      </div>
    </div>
    
    <div class="action-panel hidden" id="selectionActivePanel">
      <div class="mode-desc selection-pulse">Interactive Selection Mode Active</div>
      <p style="font-size:12px; margin:0 0 12px 0;">The popup closed. Drag an area on the webpage to select, then re-open this menu.</p>
      <button id="cancelSelectionBtn" class="btn-secondary">Cancel Selection</button>
    </div>
    
    <!-- RESULTS UI -->
    <div id="results" class="hidden fade-in">
      <div class="results-header" id="resultsHeader">Results Found</div>
      <div class="stats-grid">
        <div class="stat-card">
          <h3 class="stat-title">Images</h3>
          <p id="imageCount" class="stat-value">0</p>
        </div>
        <div class="stat-card">
          <h3 class="stat-title">Text Length</h3>
          <p id="textCount" class="stat-value">0</p>
        </div>
      </div>
      
      <div class="tabs">
        <button class="tab-btn active" data-target="text-content">Text</button>
        <button class="tab-btn" data-target="img-content">Images</button>
      </div>

      <div class="tab-content active" id="text-content">
        <textarea id="extractedText" readonly placeholder="No text found..."></textarea>
        <div class="actions">
          <button id="copyTextBtn" class="btn-secondary">Copy Text</button>
          <button id="exportTextBtn" class="btn-secondary">Export .txt</button>
        </div>
      </div>
      
      <div class="tab-content" id="img-content">
        <div id="extractedImages" class="image-list"></div>
        <div class="actions">
          <button id="downloadImagesBtn" class="btn-secondary">Download All (ZIP)</button>
        </div>
      </div>
      
      <button id="resetViewBtn" class="btn-tertiary" style="margin-top:16px;">Start Over</button>
    </div>
  </div>
  <script src="jszip.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
